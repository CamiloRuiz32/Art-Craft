<!DOCTYPE html>
<html lang="es">

</head>
<body>
  <!-- Barra de navegación -->
  <header class="navbar">
    <div class="logo">ART CRAFT</div>
    <nav>

      <a href="#">Cuenta</a>
      <a href="#">Favoritos</a>
      <a href="#">Carrito</a>

  </header>

  <!-- Sección de categorías -->
  <main>

    <!-- Productos de mochilas -->

      <div class="producto">
        <img src="Imagenes/mochila2.png" alt="Mochila artesanal">
        <button>Mostrar</button>
      </div>
      <div class="producto">
        <img src="Imagenes/mochila3.png" alt="Mochila artesanal">
        <button>Mostrar</button>

      <!-- Agrega más productos según necesites -->
    </section>

  <footer>
    <p>&copy; 2026 Art Craft</p>
  </footer>

</html>
