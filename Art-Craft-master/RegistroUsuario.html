<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - ART CRAFT</title>
  <link rel="stylesheet" href="Registro.css">
</head>
<body>
  <header>
    <h1>ART CRAFT</h1>
    <nav>
      <div class="search-box">
        <a href="#">Inicio</a>
        <div class="search-container">
          <input type="text" placeholder="Buscar producto...">
          <span class="search-icon">🔍</span>
        </div>
      </div>
      <div class="icons">
        <span class="icon">👤</span>
        <span class="icon">🔔</span>
        <span class="icon">🛒</span>
        <span class="icon">☰</span>
      </div>
    </nav>
  </header>

  <main class="registro-container">
    <h2>REGISTRO DE USUARIO</h2>
    <form>
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ingresa tu nombre">

      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="Ingresa tu correo">

      <label for="password">Crear contraseña</label>
      <input type="password" id="password" placeholder="Crea una contraseña">

      <label for="confirmar">Confirmar contraseña</label>
      <input type="password" id="confirmar" placeholder="Repite tu contraseña">

      <label for="tipo">Tipo de usuario</label>
      <select id="tipo">
        <option value="">Seleccionar</option>
        <option value="artesano">Artesano</option>
        <option value="cliente">Cliente</option>
      </select>

      <button type="submit">REGISTRARME</button>
    </form>
    <p>¿Ya tienes una cuenta? <a href="#">Ingresar</a></p>
  </main>
</body>
</html>
