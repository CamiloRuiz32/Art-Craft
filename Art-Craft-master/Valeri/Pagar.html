<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Pagar-Art Craft</title>
<link rel="stylesheet" href="Pagar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="header">
   <div class="logo">
    <img src="../Imagenes/Logo2.png" alt="Logo">
    <span>ART CRAFT</span>
</div>

    <div class="nav-icons">
  <div class="contenedor-busqueda">
    <input class="search-box" type="text" placeholder="Buscar producto...">
    <i class="fa-solid fa-magnifying-glass"></i>
  </div>
  <a href="#">Inicio</a>
  <a href="#"><i class="fa fa-user"></i></a>
  <a href="#"><i class="fa fa-bell"></i></a>
  <a href="#"><i class="fa fa-shopping-cart"></i></a>
</div>
</div>

<div class="container">
    <div class="total">
        Total a pagar:<br>
        <strong>$120.000</strong>
    </div>

    <div class="tabs">
        <div class="tab active">Tarjeta de crédito/débito</div>
        <div class="tab">Transferencia Bancaria</div>
        <div class="tab">Pago Contraentrega</div>
    </div>

    <div class="form">
        <label>Nombre de la Tarjeta</label>
     <div class="cards">
    <img src="../Imagenes/Visa.png" alt="Visa">
    <img src="../Imagenes/Mastercard.png" alt="Mastercard">
    <img src="../Imagenes/America express.png" alt="Amex">
</div>
        <input class="input" type="text" placeholder="Nombre en la tarjeta">

        <input class="input" type="text" placeholder="1234 456 45678">
        
         <label>Vencimiento</label>
        <div class="row">
            <input class="input" type="text" placeholder="MM">
            <input class="input" type="text" placeholder="YY">
            <input class="input" type="text" placeholder="CVV">
        </div>

        <button class="btn">Pagar $120.000</button>
    </div>
</div>

</body>
</html>
