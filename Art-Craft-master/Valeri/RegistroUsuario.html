<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Art Craft</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="Registro.css">
</head>

<body>

<header class="navbar">
<div class="logo">
    <img src="../Imagenes/Logo2.png" alt="Logo">
    <span>ART CRAFT</span>
</div>

<div class="search-box">
    <input type="text" placeholder="Buscar producto...">
    <span class="icon"><i class="fa fa-search"></i></span>
</div>
   <div class="icons">
    <i class="fas fa-user"></i>
    <i class="fas fa-bell"></i>
    <i class="fas fa-cart-shopping"></i>
    <i class="fas fa-bars"></i>
    
</div>
</header>

<section class="registro">
    <h1>REGISTRO DE USUARIO</h1>

    <div class="formulario">
        <label>Nombre completo</label>
        <input type="text" placeholder="Ingresa tu nombre">

        <label>Correo electronico</label>
        <input type="email" placeholder="Ingresa tu correo">

        <label>Crear contraseña</label>
        <input type="password" placeholder="Crea una contraseña">

        <label>Confirmar contraseña</label>
        <input type="password" placeholder="Repite tu contraseña">

        <label>Tipo de usuario</label>
        <select>
            <option>Seleccionar: Artesano Cliente</option>
            <option>Artesano</option>
            <option>Cliente</option>
        </select>

        <button>REGISTRAME</button>
        <p>¿Ya tienes una cuenta? <a href="#">Ingresar</a></p>
    </div>
</section>

</body>
</html>
