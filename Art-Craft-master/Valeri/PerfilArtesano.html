<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ART CRAFT</title>
  <link rel="stylesheet" href="PerfilArtesano.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- HEADER -->
  <header class="navbar">
    <img src="Imagenes/Logo2.png" alt="Logo ART CRAFT" class="logo">
    <nav class="menu">
      <a href="#">Inicio</a>
      <a href="#">Perfil del Artesano</a>
    </nav>
    <div class="search-box">
      <input type="text" placeholder="Buscar producto...">
      <i class="fa fa-search"></i>
    </div>
    <div class="icons">
      <i class="fa fa-user"></i>
      <i class="fa fa-bell"></i>
      <i class="fa fa-shopping-cart"></i>
    </div>
  </header>

  <!-- PERFIL DEL ARTESANO -->
 <section class="perfil-artesano">
    <img src="../Imagenes/Artesana.png" alt="María Gómez" class="foto-artesana">
    <h1>María Gómez</h1>
    <h2>Artesana de Nariño</h2>
    <p class="sobre-mi">Aprendimos de nuestros ancestros...<br>
    Llevo más de 30 años creando artesanías que cuentan la historia de mi tierra.</p>
</section>

  <!-- GALERÍA DE CREACIONES -->
  <section class="galeria">
    <h2>Mis creaciones</h2>
   <div class="imagenes">
  <img src="../Imagenes/Mochila.png" alt="Mochila">
  <img src="../Imagenes/Olla.png" alt="Olla">
  <img src="../Imagenes/Jarron.png" alt="Jarrón">
  <img src="../Imagenes/platos.png" alt="Platos">
</div>
  </section>
</body>
</html>
