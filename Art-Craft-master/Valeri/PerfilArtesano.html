<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Artesano - Art Craft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="PerfilArtesano.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <img src="../Imagenes/Logo2.png" alt="Logo" class="logo-img">
            <span class="logo-text">ART CRAFT</span>
        </div>
        <nav class="nav-center">
            <a href="index.html" class="nav-link">Inicio</a>
            <div class="search-container">
                <input type="text" placeholder="Buscar producto....">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </nav>
        <div class="header-right">
            <i class="fa-regular fa-user"></i>
            <i class="fa-regular fa-bell"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <section class="artisan-banner">
        <div class="banner-content">
            <h1>Perfil del Artesano</h1>
            <h2 class="artisan-name">María Gómez</h2>
            <p class="artisan-location">Artesana de Nariño</p>
        </div>
        <img src="../Imagenes/Artesana.png" alt="María Gómez" class="banner-bg">
    </section>

    <main class="info-container">
        <section class="about-me">
            <h3>Sobre Mi</h3>
            <div class="highlight-box">
                <h4>Aprendimos de nuestros ancestros...</h4>
            </div>
            <p class="description">Llevo más de 30 años creando artesanías que cuentan la historia de mi tierra</p>
        </section>

        <section class="creations">
            <h3>Mis creaciones</h3>
            <div class="creations-grid">
                <img src="../Imagenes/Mochila.png" alt="Mochila">
                <img src="../Imagenes/platos.png" alt="Platos">
                <img src="../Imagenes/Jarron.png" alt="Jarron">
                <img src="../Imagenes/Olla.png" alt="Olla">
            </div>
        </section>
    </main>

</body>
</html>
