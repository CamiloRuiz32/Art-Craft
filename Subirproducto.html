<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART CRAFT</title>

<!-- LLAMAR CSS -->
<link rel="stylesheet" href="Subirproducto.css">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="contenedor">

    <!-- HEADER -->
    <header>

        <div class="container">

            <!-- LOGO -->
            <div class="logo-container">
                <img src="Imagenes/Logo2.png" alt="Logo" class="logo-img">
                <span class="logo-text">ART CRAFT</span>
            </div>

            <!-- NAV -->
            <nav>


                <div class="search-container">
                    <input type="text" placeholder="Buscar producto...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <a href="#">Inicio</a>
                <a href="#"><i class="fa-regular fa-user"></i></a>

                <a href="#"><i class="fa-regular fa-bell"></i></a>

                <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>

                <a href="#"><i class="fa-solid fa-bars"></i></a>

            </nav>

        </div>

    </header>

    <!-- TITULO -->
    <section class="titulo">

        <h1>Subir nuevo producto</h1>

        <p>Muestra tu arte al mundo</p>

    </section>

    <!-- CONTENIDO -->
    <section class="contenido">

        <!-- FORMULARIO -->
        <div class="formulario">

            <label>Nombre del producto</label>

            <input type="text" placeholder="Ingresa el nombre del producto...">

            <label>Categoria</label>

            <select>
                <option>Seleccionar categoria</option>
                <option>Tejidos</option>
                <option>Cerámica</option>
                <option>Madera</option>
                <option>Joyería</option>
                <option>Pinturas</option>
                <option>Decoración</option>
                <option>Mochilas</option>
                <option>Accesorios</option>
            </select>

            <label>Descripción</label>

            <textarea placeholder="Descripción del producto..."></textarea>

            <label>Precio</label>

            <input type="text" placeholder="Digite el valor del producto...">

            <label for="imagen" class="subir">
                <i class="fa-solid fa-upload"></i>
                Subir Imagen
            </label>

            <input type="file" id="imagen" hidden>

            <button class="publicar">
                PUBLICAR PRODUCTO
            </button>

        </div>

        <!-- PREVIEW -->
        <div class="preview">

            <h2>Vista Previa</h2>

            <img src="Imagenes/Mochila.png" alt="" class="producto">

            <h3>Mochila Wayuu</h3>

            <p>Precio: $450.000</p>

            <p>Categoria: Tejidos</p>

            <img src="Imagenes/vacijass.png" alt="" class="vasijas">

        </div>

    </section>

    <!-- FOOTER -->
    <footer></footer>

</div>

</body>
</html>
