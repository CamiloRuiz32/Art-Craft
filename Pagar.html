    </a>
      <div class="contenedor-busqueda">
        <input class="search-box" type="text" placeholder="Buscar producto...">

      </div>

      <div class="nav-icons">
          <a href="Inicio.html">Inicio</a>

          <a href="PerfilArtesano.html">
              <i class="fa-solid fa-user"></i>
          </a>

          <a href="Notificaciones.html">
              <i class="fa-solid fa-bell"></i>
          </a>

          <a href="Carrito.html">
              <i class="fa-solid fa-cart-shopping"></i>
          </a>

          <div class="menu-container">
              <a href="#" class="btn-menu">
                  <i class="fa-solid fa-bars"></i>
              </a>

              <div class="menu-lateral">
                  <a href="Subirproducto.html">Subir producto</a>

          </div>
      </div>

    </nav>
</header>

<main class="payment-container">
    <p class="total-label">Total a pagar:</p>
    <p class="price">$</p>

    <div class="tabs">
      <button class="tab active">Tarjeta de crédito/débito</button>
      <button class="tab">Transferencia Bancaria</button>
      <button class="tab">Pago Contraentrega</button>
    </div>

    <form class="card-form">
      <div class="card-logos-inline">
        <img src="Imagenes/Visa.png" alt="Visa">
        <img src="Imagenes/Mastercard.png" alt="Mastercard">
        <img src="Imagenes/America express.png" alt="Amex">
      </div>

      <label>Nombre de la Tarjeta</label>
      <input type="text" class="input-field" placeholder="Nombre completo">

      <label>Número de la tarjeta</label>
      <input type="text" class="input-field" placeholder="1234 456 45678">

      <label>Vencimiento</label>
      <div class="expiry">
        <input type="text" class="input-field" placeholder="MM">
        <input type="text" class="input-field" placeholder="AA">
        <input type="text" class="input-field" placeholder="CVV">
      </div>

      <button type="submit" class="pay-btn">Pagar $</button>
    </form>
</main>
<footer class="pie-pagina">
        <div class="grupo-1">
            <div class="box">
                <figure>
                    <a href="#">
                        <img src="/Imagenes/Logo footer.png" alt="Logo de Art Craft">
                    </a>
                </figure>
            </div>
            <div class="box">
                <h2>SIGUENOS</h2>

                    </div>

            </div>
            <div class="box">
              <h2>CONTÁCTANOS</h2>

              <p><i class="fa-solid fa-location-dot"></i> Popayán, Cauca</p>
              <p><i class="fa-solid fa-phone"></i> +57 300 000 0000</p>
              <p><i class="fa-solid fa-envelope"></i> artcraft@gmail.com</p>
            </div>
            <div class="box">
              <h2>MÉTODOS DE PAGO</h2>
                <div class="red-pagos">
                  <a href=""><i class="fa-brands fa-cc-visa"></i></a>

                  <a href="#" class="nequi">N</a>
                  <a href=""><i class="fa-solid fa-building-columns"></i></a>
                </div>
             </div>

        </div>

        </div>
        <div class="grupo-2">
