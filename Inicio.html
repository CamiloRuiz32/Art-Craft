<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Craft - Contacto</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Inicio.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <img src="/Imagenes/logo4.png" alt="Logo">
      </div>

      <div class="contenedor-busqueda">
        <input class="search-box" type="text" placeholder="Buscar producto...">
        <i class="fas fa-search"></i>
      </div>

      <div class="nav-icons">
        <a href="#">Inicio</a>
        <a href="#"><i class="fa-solid fa-user"></i></a>
        <a href="#"><i class="fa-solid fa-bell"></i></a>
        <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="#"><i class="fa-solid fa-bars"></i></a>
      </div>
    </nav>
  </header>


  <main class="pagina-inicio">
    <section class="hero">
      <img class="fondo-hero" src="/Imagenes/Inicio.jpg" alt="Artesano trabajando ceramica">

      <div class="contenido-hero">
        <p class="etiqueta">Hecho a mano en Colombia</p>
        <h1>ARTESANIAS<br><span>COLOMBIANAS</span></h1>
        <p class="descripcion">Tesoro cultural hecho a mano</p>
        <a href="#" class="boton-principal">Ver arte colombiano</a>
      </div>

    </section>
<section class="destacados">
  <h2>Destacados del mes</h2>
  <p>Descubre las piezas artesanales más admiradas por nuestros visitantes.</p>

  <div class="productos">
    <div class="producto">
      <img src="Imagenes/Mochila.png" alt="Mochila artesanal">
      <button>Ver más</button>
    </div>
    <div class="producto">
      <img src="Imagenes/Mochilawayu.png.png" alt="Cerámica artesanal">
      <button>Ver más</button>
    </div>
    <div class="producto">
      <img src="Imagenes/bisuteria1.jpg" alt="Bisutería artesanal">
      <button>Ver más</button>
    </div>
  </div>
</section>
  </main>
</body>
</html>
