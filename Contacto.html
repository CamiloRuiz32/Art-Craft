<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto y Soporte</title>
  <link rel="stylesheet" href="Contacto.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="frame">

    <header class="navbar">
      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/2965/2965879.png" alt="logo">
        <span>ART CRAFT</span>
      </div>

      <a href="#" class="inicio">Inicio</a>

      <div class="search-box">
        <input type="text" placeholder="Buscar producto...">
        <button><i class="fa fa-search"></i></button>
      </div>

      <div class="icons">
        <i class="fa-regular fa-user"></i>
        <i class="fa-regular fa-bell"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-solid fa-bars"></i>
      </div>
    </header>

    <section class="main-content">
      <div class="title-box">
        <h1>Contacto y soporte</h1>
        <p>¡Estamos aquí para ayudarte!</p>
      </div>

      <div class="content-box">

        <div class="form-container">

          <p class="campo">Nombre o Empresa</p>
          <div class="input-group">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Ingresa tu entidad">
          </div>

          <p class="campo">Correo Electrónico</p>
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Ingresa tu correo">
          </div>

          <p class="campo">Mensaje</p>
          <textarea placeholder="Escribe tu mensaje..."></textarea>

          <button class="send-btn">ENVIAR MENSAJE</button>
        </div>

        <div class="help-box">
          <h3>¿Necesitas ayuda?</h3>
          <p><i class="fa-solid fa-phone"></i> +57 325 567 8790</p>
          <p><i class="fa-solid fa-envelope"></i> contacto@gmail.com</p>
          <p><i class="fa-regular fa-clock"></i> Lunes - Viernes 8am - 6pm</p>
        </div>

      </div>
    </section>

    <footer class="footer-pattern"></footer>

  </div>

</body>
</html>
