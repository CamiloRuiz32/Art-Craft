<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto y Soporte</title>
  <link rel="stylesheet" href="Contacto.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="frame">

    
    <div class="navbar">

      <div class="logo">
        <img src="Art-Craft-master/Imagenes/Logo2.png" class="logo img">
        <span>ART CRAFT</span>
      </div>

      <div class="inicio">Inicio</div>

      <div class="busqueda">
        <input type="text" placeholder="Buscar producto...">
        <i class="fa fa-search"></i>
      </div>

      <div class="iconos">
        <i class="fa-regular fa-user"></i>
        <i class="fa-regular fa-bell"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-solid fa-bars"></i>
      </div>

    </div>

    
    <div class="contenido">

      <h1>Contacto y soporte</h1>
      <p class="subtitulo">¡Estamos aquí para ayudarte!</p>

      <div class="cajas">

        <div class="formulario">

          <p>Nombre o Empresa</p>
          <div class="input-box">
            <i class="fa-regular fa-user"></i>
            <input type="text" placeholder="Ingresa tu entidad">
          </div>

          <p>Correo Electrónico</p>
          <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Ingresa tu correo">
          </div>

          <p>Mensaje</p>
          <textarea placeholder="Escribe tu mensaje..."></textarea>

          <button>ENVIAR MENSAJE</button>

        </div>

        <div class="ayuda">
          <div class="titulo-ayuda">¿Necesitas ayuda?</div>
          <div class="info-ayuda">
            <p><i class="fa-solid fa-phone"></i> +57 325 567 8790</p>
            <p><i class="fa-solid fa-envelope"></i> contacto@gmail.com</p>
            <p><i class="fa-regular fa-clock"></i> Lunes - Viernes 8am - 6pm</p>
          </div>
        </div>

      </div>

    </div>
    
    <div class="footer"></div>

  </div>

</body>
</html>
