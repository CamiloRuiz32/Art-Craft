<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito del Artesano</title>

<link rel="stylesheet" href="Carritoartesano.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="contenedor">

    <!-- BARRA SUPERIOR NUEVA -->
    <header>
      <div class="container">

        <!-- Logo -->
        <div class="logo-container">
          <img src="Imagenes/Logo2.png" alt="Logo Art Craft" class="logo-img">
          <p class="logo-text">ART CRAFT</p>
        </div>

        <!-- Navegación -->
        <nav>

          <div class="search-container">
            <input type="text" placeholder="Buscar producto...">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>

          <a href="#">Inicio</a>

          <a href="#">
            <i class="fa-solid fa-user"></i>
          </a>

          <a href="#">
            <i class="fa-solid fa-bell"></i>
          </a>

          <a href="#">
            <i class="fa-solid fa-cart-shopping"></i>
          </a>

        </nav>

      </div>
    </header>

    <!-- TITULO -->
    <div class="titulo-principal">
        Carrito del Artesano
    </div>

    <!-- CONTENIDO -->
    <section class="principal">

        <!-- PRODUCTOS -->
        <div class="productos">

            <h2>Tus Productos</h2>

            <div class="producto">

                <img src="Imagenes/Mochila.png" alt="">

                <div class="detalle">
                    <h3>Mochila Wayuu</h3>
                    <p>$400.000</p>
                </div>

                <div class="cantidad">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                    <a href="#">Eliminar</a>
                </div>

            </div>

            <div class="producto">

                <img src="Imagenes/Jarron.png" alt="">

                <div class="detalle">
                    <h3>Vaso de Tela</h3>
                    <p>$300.000</p>
                </div>

                <div class="cantidad">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                    <a href="#">Eliminar</a>
                </div>

            </div>

        </div>

        <!-- RESUMEN -->
        <div class="resumen">

            <h2>Resumen de Pedido</h2>

            <div class="fila">
                <span>Subtotal:</span>
                <span>$160.000</span>
            </div>

            <div class="fila">
                <span>Envío:</span>
                <span>$10.000</span>
            </div>

            <div class="fila">
                <span>Total:</span>
                <span>$170.000</span>
            </div>

            <button class="pagar">Ir a Pagar</button>

        </div>

    </section>

    <!-- PARTE INFERIOR -->
    <section class="inferior">

        <div class="datos">

            <h2>Datos del Envío</h2>

            <p>Dirección de Envío</p>

            <input type="text" placeholder="Nombre Completo">
            <input type="text" placeholder="Teléfono">
            <input type="text" placeholder="Dirección">

        </div>

        <div class="pago">

            <h2>Datos del Envío</h2>

            <label>
              <input type="radio" name="metodo">
              Tarjeta de crédito/Débito
            </label>

            <label>
              <input type="radio" name="metodo">
              Transferencia Bancaria
            </label>

            <label>
              <input type="radio" name="metodo">
              Pago Contrarrega
            </label>

        </div>

    </section>

</div>

</body>
</html>
